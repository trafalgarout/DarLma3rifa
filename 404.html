<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | دار المعرفة للزواج</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .error-container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-code {
            font-size: 8rem;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        .error-message {
            font-size: 1.8rem;
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
        }

        .error-description {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .home-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .home-button:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .error-icon {
            font-size: 5rem;
            color: var(--primary-color);
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .search-suggestions {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 10px;
        }

        .search-suggestions h3 {
            color: var(--secondary-color);
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .suggestion-links {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }

        .suggestion-link {
            color: var(--primary-color);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background: white;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .suggestion-link:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .error-container {
                padding: 2rem;
            }

            .error-code {
                font-size: 6rem;
            }

            .error-message {
                font-size: 1.5rem;
            }

            .error-description {
                font-size: 1rem;
            }

            .error-icon {
                font-size: 4rem;
            }
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 4rem;
            }

            .error-message {
                font-size: 1.2rem;
            }

            .suggestion-links {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <i class="fas fa-search error-icon"></i>
        <div class="error-code">404</div>
        <h1 class="error-message">عذراً، الصفحة غير موجودة</h1>
        <p class="error-description">
            يبدو أن الصفحة التي تبحث عنها غير موجودة أو تم نقلها.
            <br>
            يمكنك العودة إلى الصفحة الرئيسية أو تصفح الاقتراحات أدناه.
        </p>
        <a href="index.html" class="home-button">
            <i class="fas fa-home"></i>
            العودة للصفحة الرئيسية
        </a>

        <div class="search-suggestions">
            <h3>روابط قد تهمك</h3>
            <div class="suggestion-links">
                <a href="index.html" class="suggestion-link">الصفحة الرئيسية</a>
                <a href="#" class="suggestion-link">البحث عن شريك</a>
                <a href="#" class="suggestion-link">تسجيل حساب جديد</a>
                <a href="#" class="suggestion-link">تواصل معنا</a>
            </div>
        </div>
    </div>

    <script>
        // Add some interactive elements
        document.addEventListener('DOMContentLoaded', function() {
            // Make error code interactive
            const errorCode = document.querySelector('.error-code');
            errorCode.addEventListener('mouseover', function() {
                this.style.transform = 'scale(1.1)';
            });
            errorCode.addEventListener('mouseout', function() {
                this.style.transform = 'scale(1)';
            });

            // Add hover effect to icon
            const errorIcon = document.querySelector('.error-icon');
            errorIcon.addEventListener('mouseover', function() {
                this.style.transform = 'rotate(15deg)';
            });
            errorIcon.addEventListener('mouseout', function() {
                this.style.transform = 'rotate(0)';
            });
        });
    </script>
</body>
</html>
